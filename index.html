<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healy Vector Labs | Quant Portfolio</title>
    <style>
        :root { --bg: #0d1117; --surface: #161b22; --border: #30363d; --text-main: #c9d1d9; --text-muted: #8b949e; }
        body { background-color: var(--bg); color: var(--text-main); font-family: -apple-system, sans-serif; margin: 0; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 1000px; }
        .header { border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 30px; }
        .header h1 { margin: 0; font-size: 28px; color: #ffffff; }
        .header h3 { margin: 8px 0 0 0; font-size: 14px; color: var(--text-muted); text-transform: uppercase; }
        .panel { background-color: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 24px; }
        .terminal { height: 60vh; overflow-y: auto; font-family: 'SFMono-Regular', monospace; font-size: 13px; line-height: 1.6; }
        .line { margin-bottom: 6px; }
        .timestamp { color: var(--text-muted); margin-right: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Michael Healy</h1>
            <h3>Lead Architect | Healy Vector Labs</h3>
        </div>
        <div class="panel">
            <div class="terminal" id="output">Initializing stream...</div>
        </div>
    </div>
    <script>
        const output = document.getElementById('output');
        const URL = "https://healy-vector-labs-default-rtdb.firebaseio.com/fase_telemetry.json";
        async function update() {
            try {
                const res = await fetch(URL);
                const data = await res.json();
                if (data) {
                    const time = new Date().toLocaleTimeString('en-US', { hour12: false });
                    const entry = typeof data === 'object' ? JSON.stringify(data, null, 2) : data;
                    output.innerHTML = `<div class="line"><span class="timestamp">[${time}]</span><pre style="display:inline;">${entry}</pre></div>`;
                }
            } catch (e) { output.textContent = "Error: " + e; }
        }
        setInterval(update, 2000);
        update();
    </script>
</body>
</html>
