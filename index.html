<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healy Vector Labs - Live Telemetry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        quant: {
                            dark: '#0d1117',
                            card: '#161b22',
                            border: '#30363d',
                            accent: '#58a6ff',
                            text: '#c9d1d9',
                            muted: '#8b949e',
                            alertRed: '#ff7b72',
                            alertBg: '#490202',
                            profitGreen: '#2ea043'
                        }
                    },
                    fontFamily: { mono: ['"Courier New"', 'Courier', 'monospace'] }
                }
            }
        }
    </script>
</head>
<body class="bg-quant-dark text-quant-text font-mono p-4 md:p-8 min-h-screen flex flex-col">

    <header class="mb-8 border-b border-quant-border pb-6">
        <h1 class="text-3xl md:text-4xl font-bold text-quant-accent tracking-widest uppercase">
            Healy Vector Labs
        </h1>
        <p class="text-quant-muted mt-2 text-sm md:text-base">FASE Engine: Live Quantitative Telemetry Dashboard</p>
        
        <div class="mt-4 flex items-center gap-3 text-sm">
            <span class="relative flex h-3 w-3">
              <span id="ping-ring" class="animate-ping absolute inline-flex h-full w-full rounded-full bg-quant-muted opacity-75"></span>
              <span id="ping-dot" class="relative inline-flex rounded-full h-3 w-3 bg-quant-muted"></span>
            </span>
            <span id="timestamp" class="text-quant-muted tracking-wide">Initializing stream...</span>
        </div>
    </header>

    <main id="data-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 pb-10">
        </main>

    <script>
        // Fetching from your Realtime Database
        const FIREBASE_URL = "https://healy-vector-labs-default-rtdb.firebaseio.com/fase_telemetry.json";

        async function fetchLiveData() {
            try {
                // Cache buster to force fresh data load
                const response = await fetch(FIREBASE_URL + '?t=' + new Date().getTime());
                const data = await response.json();

                if (!data) {
                    document.getElementById('timestamp').innerText = "Database linked, awaiting entry stream...";
                    return;
                }

                // SMART SCHEMA PARSING
                let targetProjections = null;
                if (data.projections && typeof data.projections === 'object') {
                    targetProjections = data.projections;
                } else if (data.data && typeof data.data === 'object') {
                    targetProjections = data.data;
                } else if (typeof data === 'object') {
                    const sampleKeys = Object.keys(data);
                    const looksLikeRootData = sampleKeys.some(key => data[key] && typeof data[key] === 'object' && ('expected_value' in data[key] || 'ci_high' in data[key]));
                    if (looksLikeRootData) {
                        targetProjections = data;
                    }
                }

                if (!targetProjections || Object.keys(targetProjections).length === 0) {
                    document.getElementById('timestamp').innerText = "Data pattern unmapped. Check JSON payload.";
                    return;
                }

                // Update Status to Online Green
                document.getElementById('ping-ring').className = "animate-ping absolute inline-flex h-full w-full rounded-full bg-quant-profitGreen opacity-75";
                document.getElementById('ping-dot').className = "relative inline-flex rounded-full h-3 w-3 bg-quant-profitGreen";
                document.getElementById('timestamp').innerText = "Last Engine Sync: " + (data.last_updated || new Date().toLocaleTimeString());

                const container = document.getElementById('data-container');
                container.innerHTML = ""; 

                for (const [ticker, stats] of Object.entries(targetProjections)) {
                    if (ticker === 'last_updated' || ticker === 'execution_id') continue;
                    if (!stats || typeof stats !== 'object') continue;

                    const ev = parseFloat(stats.expected_value) || 0;
                    const ciHigh = parseFloat(stats.ci_high) || 0;
                    const ciLow = parseFloat(stats.ci_low) || 0;
                    const sentiment = parseFloat(stats.sentiment_score) || 0;

                    let evPercentage = 50; 
                    if (ciHigh > ciLow) {
                        evPercentage = ((ev - ciLow) / (ciHigh - ciLow)) * 100;
                        evPercentage = Math.max(0, Math.min(100, evPercentage));
                    }

                    let sentimentColor = 'text-quant-muted';
                    if (sentiment > 0) sentimentColor = 'text-quant-profitGreen';
                    if (sentiment < 0) sentimentColor = 'text-quant-alertRed';

                    const alertHtml = stats.volatility_alert 
                        ? `<span class="animate-pulse bg-quant-alertBg text-quant-alertRed text-xs font-bold px-2 py-1 rounded border border-quant-alertRed shadow-[0_0_8px_#ff7b72]">⚠️ VOLATILE</span>`
                        : `<span class="bg-quant-dark text-quant-muted text-xs font-bold px-2 py-1 rounded border border-quant-border">STABLE</span>`;

                    const card = document.createElement('div');
                    card.className = 'bg-quant-card border border-quant-border rounded-lg p-5 shadow-lg hover:border-quant-accent transition-colors duration-300';

                    card.innerHTML = `
                        <div class="flex justify-between items-center mb-4 border-b border-quant-border pb-3">
                            <h2 class="text-2xl font-bold text-white tracking-wider">${ticker}</h2>
                            ${alertHtml}
                        </div>
                        <div class="space-y-4 text-sm">
                            <div class="flex justify-between items-end">
                                <span class="text-quant-muted">Expected Value</span>
                                <span class="font-bold text-lg text-quant-accent">$${ev.toFixed(2)}</span>
                            </div>
                            <div class="mt-2 bg-quant-dark p-3 rounded border border-quant-border">
                                <div class="flex justify-between text-xs text-quant-muted mb-2">
                                    <span>L: $${ciLow.toFixed(2)}</span>
                                    <span>H: $${ciHigh.toFixed(2)}</span>
                                </div>
                                <div class="relative w-full h-1.5 bg-[#1f242c] rounded-full overflow-hidden">
                                    <div class="absolute top-0 h-full w-2 bg-quant-accent rounded-full shadow-[0_0_5px_#58a6ff]" style="left: calc(${evPercentage}% - 4px);"></div>
                                </div>
                            </div>
                            <div class="flex justify-between items-center">
                                <span class="text-quant-muted">Sentiment Score</span>
                                <span class="font-bold ${sentimentColor}">${sentiment.toFixed(3)}</span>
                            </div>
                            <div class="pt-3 border-t border-quant-border">
                                <p class="text-xs text-quant-muted leading-relaxed line-clamp-2" title="${stats.headline || 'No recent news'}">
                                    📰 ${stats.headline || "No recent news detected"}
                                </p>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                }
            } catch (error) {
                console.error("Engine Telemetry Sync Failed:", error);
                document.getElementById('timestamp').innerText = "CONNECTION RUNTIME FAULT. Retrying...";
            }
        }

        fetchLiveData();
        setInterval(fetchLiveData, 5000);
    </script>
</body>
</html>
