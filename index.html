<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healy Vector Labs | Quantum Intelligence</title>
    <style>
        :root {
            --bg: #050505;
            --text: #ffffff;
            --dim: #777;
            --accent: #3b82f6;
            --card-bg: #0d0d0d;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            padding: 40px 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        header { border-bottom: 1px solid #222; padding-bottom: 30px; margin-bottom: 50px; }
        h1 { font-size: 2.5rem; font-weight: 900; letter-spacing: -0.05em; margin: 0; }
        .blue { color: var(--accent); }
        .architect-meta { color: var(--dim); font-size: 0.9rem; margin-top: 10px; text-transform: uppercase; letter-spacing: 0.1em; }
        
        .engine-status {
            background: var(--card-bg);
            border: 1px solid #222;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        .engine-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .engine-title { font-weight: 700; color: var(--accent); font-size: 1.1rem; }
        .status-pill { font-size: 0.7rem; background: rgba(59, 130, 246, 0.1); padding: 4px 10px; border-radius: 100px; border: 1px solid var(--accent); }

        .ticker-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .ticker-card { background: #111; padding: 15px; border-radius: 6px; border: 1px solid #1a1a1a; }
        .ticker-name { font-weight: 700; font-size: 1.2rem; }
        .ticker-val { display: block; font-family: 'Courier New', monospace; font-size: 1.4rem; margin: 10px 0; }
        .ticker-meta { font-size: 0.8rem; color: var(--dim); display: flex; justify-content: space-between; }
        
        footer { margin-top: 60px; color: #333; font-size: 0.8rem; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>HEALY <span class="blue">VECTOR LABS</span></h1>
            <div class="architect-meta">Lead Architect // Agentic AI Orchestration</div>
        </header>

        <section class="engine-status">
            <div class="engine-header">
                <span class="engine-title">CORE ENGINE: fase_euler.py</span>
                <span class="status-pill">LIVE EXECUTION</span>
            </div>
            <p style="color: var(--dim); font-size: 0.9rem;">Autonomous quantitative intelligence pipeline. Real-time Monte Carlo path simulations and sentiment ingestion.</p>
            
            <div id="ticker-output" class="ticker-grid">
                <!-- Data from web_status.json injects here -->
                <div class="ticker-card">Loading Veritas stream...</div>
            </div>
        </section>

        <footer>
            PROPRIETARY ARCHITECTURE - 2026 - SOVEREIGN EDITION
        </footer>
    </div>

    <script>
        async function fetchMarketData() {
            try {
                const response = await fetch('./web_status.json');
                const data = await response.json();
                const container = document.getElementById('ticker-output');
                container.innerHTML = '';

                Object.entries(data.projections).forEach(([ticker, info]) => {
                    container.innerHTML += `
                        <div class="ticker-card">
                            <div class="ticker-name">${ticker}</div>
                            <span class="ticker-val">$${info.expected_value.toFixed(2)}</span>
                            <div class="ticker-meta">
                                <span>Sent: ${info.sentiment_score}</span>
                                <span>Conf: 95%</span>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("Stream sync failed:", error);
            }
        }
        fetchMarketData();
        setInterval(fetchMarketData, 300000); // 5-minute cycle
    </script>
</body>
</html>
