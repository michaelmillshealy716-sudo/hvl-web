<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEALY VECTOR LABS | QUANTUM CORE</title>
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --panel-bg: #111111;
            --border-color: #333;
            --matrix-green: #00ff00;
            --cyan: #00ffff;
            --red: #ff3333;
            --warn: #ffcc00;
            --text-main: #cccccc;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            border: 1px solid var(--border-color);
            padding: 20px;
            width: 100%;
            max-width: 1000px;
            margin-bottom: 20px;
            background-color: var(--panel-bg);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.1);
        }

        h1 {
            color: var(--text-main);
            margin: 0 0 10px 0;
            font-size: 1.5rem;
            letter-spacing: 2px;
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            background-color: var(--matrix-green);
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 8px var(--matrix-green);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        @media (min-width: 800px) {
            .dashboard-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .panel {
            border: 1px solid var(--border-color);
            background-color: var(--panel-bg);
            padding: 20px;
        }

        .panel-header {
            color: var(--cyan);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 15px;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            padding: 4px 0;
            border-bottom: 1px dashed #222;
        }

        .data-label { color: #888; }
        .data-value { color: var(--matrix-green); font-weight: bold; }
        .data-value.high { color: var(--matrix-green); }
        .data-value.low { color: var(--warn); }

        .fase-ticker {
            margin-bottom: 15px;
            padding: 10px;
            border: 1px solid #222;
            background: #0d0d0d;
        }

        .fase-ticker h3 {
            margin: 0 0 10px 0;
            color: #fff;
            font-size: 1.1rem;
        }

        .headline {
            font-size: 0.85rem;
            color: #999;
            margin-top: 8px;
            font-style: italic;
        }

        #last-sync {
            font-size: 0.8rem;
            color: #555;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1>HEALY VECTOR LABS</h1>
        <div><span class="status-indicator"></span>LIVE TELEMETRY SYNC</div>
        <div id="last-sync">Awaiting connection...</div>
    </header>

    <div class="dashboard-grid">
        <div class="panel">
            <div class="panel-header">VERITAS AUDITOR: NHL QUANTUM CORE</div>
            <div id="veritas-content">
                <div style="color: #666;">Initializing quantum state...</div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">FASE: GEOPOLITICAL SENTIMENT ENGINE</div>
            <div id="fase-content">
                <div style="color: #666;">Ingesting EDGAR/YF feeds...</div>
            </div>
        </div>
    </div>

    <script>
        // Use cache-busting to ensure GitHub Pages doesn't serve old JSONs
        const fetchConfig = { cache: "no-store" };

        function updateDashboard() {
            const cacheBuster = `?t=${new Date().getTime()}`;

            // 1. Fetch VERITAS Score Engine Data
            fetch(`live_score.json${cacheBuster}`, fetchConfig)
                .then(response => response.json())
                .then(data => {
                    const vContent = document.getElementById('veritas-content');
                    const mtlStrike = parseFloat(data.teams.MTL.strike_chance);
                    const bufStrike = parseFloat(data.teams.BUF.strike_chance);

                    vContent.innerHTML = `
                        <div class="data-row">
                            <span class="data-label">System Entropy</span>
                            <span style="color: var(--cyan)">${data.entropy} S</span>
                        </div>
                        <div class="data-row">
                            <span class="data-label">Last Calculation</span>
                            <span>${data.timestamp}</span>
                        </div>
                        <br>
                        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; text-align: center; border-bottom: 1px solid #333; padding-bottom: 5px; margin-bottom: 10px;">
                            <div style="color: #888">METRIC</div>
                            <div>MTL (HOME)</div>
                            <div>BUF (AWAY)</div>
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; text-align: center; margin-bottom: 10px;">
                            <div style="color: #888; text-align: left;">Hamiltonian</div>
                            <div class="data-value">${data.teams.MTL.hamiltonian}</div>
                            <div class="data-value">${data.teams.BUF.hamiltonian}</div>
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; text-align: center; margin-bottom: 10px;">
                            <div style="color: #888; text-align: left;">Collapse %</div>
                            <div class="data-value">${data.teams.MTL.psi_squared}</div>
                            <div class="data-value">${data.teams.BUF.psi_squared}</div>
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; text-align: center; margin-top: 15px; padding-top: 10px; border-top: 1px dashed #333;">
                            <div style="color: #fff; text-align: left; font-weight: bold;">GOAL STRIKE</div>
                            <div class="data-value ${mtlStrike > 65 ? 'high' : 'low'}">${mtlStrike}%</div>
                            <div class="data-value ${bufStrike > 65 ? 'high' : 'low'}">${bufStrike}%</div>
                        </div>
                    `;
                })
                .catch(err => console.log('Waiting for live_score.json to compile...'));

            // 2. Fetch FASE Engine Data
            fetch(`web_status.json${cacheBuster}`, fetchConfig)
                .then(response => response.json())
                .then(data => {
                    const fContent = document.getElementById('fase-content');
                    let faseHTML = '';

                    for (const [ticker, stats] of Object.entries(data.projections)) {
                        const alertTag = stats.volatility_alert ? `<span style="color: var(--red); font-size: 0.8rem; margin-left: 10px;">[VOLATILITY ALERT]</span>` : '';
                        
                        faseHTML += `
                            <div class="fase-ticker">
                                <h3>$${ticker} ${alertTag}</h3>
                                <div class="data-row">
                                    <span class="data-label">Expected Value (1yr)</span>
                                    <span class="data-value">$${stats.expected_value}</span>
                                </div>
                                <div class="data-row">
                                    <span class="data-label">95% CI Spread</span>
                                    <span class="data-value" style="color: #aaa;">[$${stats.ci_low} - $${stats.ci_high}]</span>
                                </div>
                                <div class="data-row">
                                    <span class="data-label">Live VADER Sentiment</span>
                                    <span class="data-value ${stats.sentiment_score > 0 ? 'high' : 'low'}">${stats.sentiment_score}</span>
                                </div>
                                <div class="headline">"${stats.headline}"</div>
                            </div>
                        `;
                    }
                    fContent.innerHTML = faseHTML;
                    
                    document.getElementById('last-sync').innerText = `Sync Integrity: OK | Last Engine Cycle: ${data.last_updated}`;
                })
                .catch(err => console.log('Waiting for web_status.json to compile...'));
        }

        // Initialize dashboard immediately, then poll every 5 seconds
        updateDashboard();
        setInterval(updateDashboard, 5000);
    </script>
</body>
</html>
