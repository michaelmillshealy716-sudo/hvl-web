<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEALY VECTOR LABS // SOVEREIGN EDITION</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; padding: 20px; text-transform: uppercase; }
        .header { border-bottom: 2px solid #50f; margin-bottom: 20px; padding-bottom: 10px; }
        .matrix-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .matrix-table th, .matrix-table td { border: 1px solid #333; padding: 12px; text-align: left; }
        .matrix-table th { color: #50f; border-bottom: 2px solid #50f; }
        .sentiment { color: #0af; }
        .ev { color: #fff; font-weight: bold; }
        .node-info { font-size: 0.8em; color: #555; margin-top: 40px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>HEALY VECTOR LABS</h1>
        <div id="status-line">VERITAS V2.2 // STOCHASTIC_DETECTION_MATRIX</div>
        <div id="sync-time" style="color: #555; font-size: 0.8em;"></div>
    </div>

    <table class="matrix-table">
        <thead>
            <tr>
                <th>Ticker</th>
                <th>Expected Value (1yr)</th>
                <th>Sentiment</th>
                <th>95% Conf. Interval</th>
                <th>Veritas Score</th>
            </tr>
        </thead>
        <tbody id="matrix-body"></tbody>
    </table>

    <div class="node-info">PROPRIETARY ARCHITECTURE // 2026 // JACKSONVILLE_NODE_SVRGN</div>

    <script>
        async function updateMatrix() {
            try {
                const response = await fetch('web_status.json?t=' + Date.now());
                const data = await response.json();
                const body = document.getElementById('matrix-body');
                
                // Extract actual projections, skipping metadata root keys
                const source = data.PROJECTIONS || data.projections || data;
                const lastUpdated = data.LAST_UPDATED || data.last_updated || "SYNC_ACTIVE";
                
                document.getElementById('sync-time').innerText = "LAST_SYNC: " + lastUpdated + " // JAX_NODE";
                body.innerHTML = '';

                for (const [ticker, stats] of Object.entries(source)) {
                    // Only process objects (tickers), skip metadata strings
                    if (typeof stats !== 'object' || stats === null) continue;

                    const row = `<tr>
                        <td style="color:#a0f">${ticker}</td>
                        <td class="ev">$${stats.expected_value || '0.00'}</td>
                        <td class="sentiment">${stats.sentiment || stats.sentiment_score || '0.0'}</td>
                        <td style="color:#555">[${stats.conf_low || '?'} - ${stats.conf_high || '?'}]</td>
                        <td>${stats.veritas_score || stats.score || '0'}%</td>
                    </tr>`;
                    body.innerHTML += row;
                }
            } catch (e) { console.error("Matrix Sync Error", e); }
        }
        updateMatrix();
        setInterval(updateMatrix, 30000);
    </script>
</body>
</html>
