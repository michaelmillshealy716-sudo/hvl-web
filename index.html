<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HEALY VECTOR LABS // INSTITUTIONAL</title>
    <style>
        :root { --bg: #ffffff; --text: #0a0a0a; --accent: #1a365d; --border: #cbd5e0; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 50px; }
        .header { border-bottom: 2px solid var(--text); margin-bottom: 40px; padding-bottom: 15px; display: flex; justify-content: space-between; align-items: baseline; }
        h1 { margin: 0; font-size: 1.4rem; letter-spacing: 3px; font-weight: 800; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; border-bottom: 2px solid var(--text); font-size: 0.7rem; font-weight: 900; text-transform: uppercase; }
        td { padding: 18px 15px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        .ticker { font-weight: 900; color: var(--accent); }
    </style>
</head>
<body>
    <div class="header">
        <div><h1>HEALY VECTOR LABS</h1><div style="font-size:0.75rem; font-weight:600; color:#4a5568;">VERITAS V2.2 // STOCHASTIC_MATRIX</div></div>
        <div id="sync-time" style="font-size:0.75rem; font-weight:600; color:#4a5568;"></div>
    </div>
    <table>
        <thead><tr><th>Asset</th><th>Exp. Value (1Y)</th><th>Sentiment</th><th>95% Confidence</th><th>Veritas Score</th></tr></thead>
        <tbody id="matrix-body"></tbody>
    </table>
    <script>
        async function sync() {
            const r = await fetch('web_status.json?t=' + Date.now());
            const d = await r.json();
            const b = document.getElementById('matrix-body');
            const s = d.projections || d.PROJECTIONS || d;
            document.getElementById('sync-time').innerText = "NODE_SYNC: " + (d.last_updated || new Date().toLocaleTimeString());
            b.innerHTML = '';
            for (const [t, v] of Object.entries(s)) {
                if (typeof v !== 'object') continue;
                
                // MAPPED EXACTLY TO THE KEYS IN IMAGE_84.PNG
                const low = v.ci_low || '0.00';
                const high = v.ci_high || '0.00';
                const sent = v.sentiment_score || '0.0';
                const score = (sent * 100).toFixed(1);

                b.innerHTML += `<tr>
                    <td class="ticker">${t}</td>
                    <td style="font-weight:800;">$${v.expected_value || '0.00'}</td>
                    <td style="color:#2b6cb0; font-weight:700;">${sent}</td>
                    <td style="font-weight:600; color:#4a5568;">$${low} — $${high}</td>
                    <td style="font-weight:800;">${score}%</td>
                </tr>`;
            }
        }
        sync(); setInterval(sync, 30000);
    </script>
</body>
</html>
